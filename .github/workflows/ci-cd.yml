name: Job Application Pipeline CI/CD

on:
  push:
    branches:
      - dev
      - prod
      - main
      - master
  pull_request:
    branches:
      - dev
      - prod
      - main
      - master
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python syntax
        run: python -m compileall 01_job_sourcing 02_job_filtering 02_resume_engine 03_web_browser resume

      - name: Validate pipeline dependencies import
        run: |
          python - <<'PY'
          import bs4
          import flask
          import jinja2
          import langchain_core
          import langchain_huggingface
          import pydantic
          import requests
          PY

      - name: Validate Flask app imports
        run: |
          python - <<'PY'
          import importlib.util

          spec = importlib.util.spec_from_file_location("dashboard_app", "03_web_browser/app.py")
          module = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(module)

          routes = sorted(rule.rule for rule in module.app.url_map.iter_rules())
          required_routes = {"/", "/admin", "/api/jobs", "/api/stats", "/api/admin/jobs"}
          missing_routes = required_routes.difference(routes)
          if missing_routes:
              raise SystemExit(f"Missing routes: {sorted(missing_routes)}")
          PY

      - name: Validate resume template inputs
        working-directory: resume
        run: |
          test -f data_schema.json
          test -f standard_template.tex
          python - <<'PY'
          import json

          with open("data_schema.json", encoding="utf-8") as handle:
              json.load(handle)
          PY

  deploy-dev:
    name: Deploy Dev
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    environment:
      name: development

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run development deploy hook
        run: ./scripts/deploy.sh dev

  deploy-prod:
    name: Deploy Prod
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/prod' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run production deploy hook
        run: ./scripts/deploy.sh prod
